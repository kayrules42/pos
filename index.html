<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UPC → POS Code Launcher1</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h2 { color: #333; }
    #progress { margin-top: 20px; }
    input, button { margin: 5px 0; padding: 5px; }
  </style>
</head>
<body>

<h2>UPC → POS Code Launcher</h2>

<form id="uploadForm" enctype="multipart/form-data">
  UPC File: <input type="file" name="upcfile" accept=".xls,.xlsx"><br>
  Store File: <input type="file" name="storefile" accept=".xls,.xlsx"><br>
  <button type="submit">Start Processing</button>
</form>

<div id="progress"></div>

<script>

const SERVER = "https://uneloping-daxton-sightlessly.ngrok-free.dev";

document.getElementById("uploadForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const progressDiv = document.getElementById("progress");
    let formData = new FormData(this);

    progressDiv.innerHTML = "Uploading and processing... please wait";

    try{

        const response = await fetch(SERVER + "/start", {
            method: "POST",
            body: formData
        });

        if(!response.ok){
            throw new Error("Server returned error");
        }

        // Expect backend to respond AFTER processing is complete
        const data = await response.json();

        progressDiv.innerHTML =
            "<b>Processing Complete ✅</b><br><br>" +
            "<a href='"+SERVER + data.updated_file +"' target='_blank'>Download Updated Excel</a><br>" +
            "<a href='"+SERVER + data.api_log +"' target='_blank'>Download API Log</a>";

    }
    catch(err){

        progressDiv.innerHTML =
        "Error during processing.<br>" +
        "Make sure server is running.<br>" +
        err;

    }

});

</script>

</body>
</html>
